name: Deploy to AWS (S3 + CloudFront)

# Builds the Vite static site and deploys it to your S3 bucket, then
# invalidates the CloudFront cache so the new version goes live immediately.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Avoid overlapping deploys; let the newest push win.
concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # required for AWS OIDC (optional path, see DEPLOY.md)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Path A (default): long-lived access keys stored as repo secrets.
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Path B (recommended hardening): comment out the two lines above and
          # uncomment the next line after creating an IAM OIDC role (see DEPLOY.md).
          # role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Upload hashed assets (long cache, immutable)
        # Everything under /assets is content-hashed by Vite, so cache it hard.
        run: |
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (no cache)
        # The HTML entry must never be cached, or users get stale asset refs.
        run: |
          aws s3 cp dist/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
